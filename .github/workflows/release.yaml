name: Release

on:
  push:
    tags:
    # Only release-shaped tags (v0.1.0, ...); a tag like vendor-freeze must
    # never fire a release run.
    - v[0-9]*
  pull_request:
    paths:
    - '**.go'
    - go.mod
    - go.sum
    - .goreleaser.yaml
    - .mise/config.toml
    - .github/workflows/release.yaml
    # The snapshot job renders the demo GIF, so the render pipeline's own
    # sources are build-relevant: a broken render task or tape must fail the
    # PR here, not first surface on the tag-push release.
    - .mise/tasks/demo/**
    - demo.tape

permissions:
  contents: read

env:
  # mise resolves the go toolchain from go.mod; refuse silent auto-downloads
  # of any other version so drift fails loudly.
  GOTOOLCHAIN: local

jobs:
  snapshot:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    # Full history so goreleaser can derive the snapshot version from tags.
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    # Installs the pinned toolchain (go, goreleaser, ...) from
    # .mise/config.toml and caches it.
    - uses: jdx/mise-action@v4
      with:
        cache: true
    - run: goreleaser check
    # Rehearse the release job's demo render on the PR loop: the tag-push
    # job runs the same task and ships the result as a release asset, so a
    # render broken by a build-relevant change must fail here, not on the
    # release tag.
    - name: Render the demo GIF the release job will ship
      run: mise run demo:render
    - name: Build a snapshot release (publishes nothing)
      run: goreleaser release --snapshot --clean

  release:
    # startsWith cannot express the digit class, so guard the closest prefix;
    # the v[0-9]* tag filter above is what actually scopes the trigger.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: jdx/mise-action@v4
      with:
        cache: true
    # Fail fast on config drift that skipped the PR snapshot path.
    - run: goreleaser check
    # The demo GIF ships as a release asset (extra_files in .goreleaser.yaml)
    # that the README and the release notes embed, so render it fresh from
    # demo.tape against a throwaway k3d cluster. The task renders through the
    # pinned ghcr.io/charmbracelet/vhs container image (vhs+ttyd+ffmpeg+fonts as
    # one self-contained unit; the runner provides Docker, which k3d already
    # needs). A failed render fails the job before anything publishes — re-run
    # the workflow rather than shipping a release whose demo image 404s.
    - name: Render the demo GIF shipped as a release asset
      run: mise run demo:render
    - name: Publish the tagged GitHub Release
      run: goreleaser release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    # goreleaser's krews section (skip_upload: true) regenerates the krew
    # manifest with this tag's version and sha256s into dist/krew/craft.yaml
    # but never pushes it anywhere — krew-index only takes updates through
    # its own PR flow. Attach it to the release so the manifest can be
    # copied into krew/craft.yaml and the krew-index PR without rebuilding;
    # krew/SUBMISSION.md documents that flow. --clobber keeps a re-run of
    # this job after a partial success from failing on the already-attached
    # asset.
    - name: Attach the regenerated krew manifest to the release
      run: gh release upload --clobber "$GITHUB_REF_NAME" dist/krew/craft.yaml
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
