name: Release

on:
  push:
    tags:
    # Only release-shaped tags (v0.1.0, ...); a tag like vendor-freeze must
    # never fire a release run.
    - v[0-9]*
  pull_request:
    paths:
    - '**.go'
    - go.mod
    - go.sum
    - .goreleaser.yaml
    - .mise/config.toml
    - .github/workflows/release.yaml

permissions:
  contents: read

env:
  # mise resolves the go toolchain from go.mod; refuse silent auto-downloads
  # of any other version so drift fails loudly.
  GOTOOLCHAIN: local

jobs:
  snapshot:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    # Full history so goreleaser can derive the snapshot version from tags.
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    # Installs the pinned toolchain (go, goreleaser, ...) from
    # .mise/config.toml and caches it.
    - uses: jdx/mise-action@v4
      with:
        cache: true
    - run: goreleaser check
    - name: Build a snapshot release (publishes nothing)
      run: goreleaser release --snapshot --clean

  release:
    # startsWith cannot express the digit class, so guard the closest prefix;
    # the v[0-9]* tag filter above is what actually scopes the trigger.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: jdx/mise-action@v4
      with:
        cache: true
    # Fail fast on config drift that skipped the PR snapshot path.
    - run: goreleaser check
    - name: Publish the tagged GitHub Release
      run: goreleaser release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
