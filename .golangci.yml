version: "2"

linters:
  default: standard
  enable:
  - errcheck
  - errname
  - errorlint
  - ginkgolinter
  - gocognit
  - gocyclo
  - govet
  - ineffassign
  - misspell
  - nilnil
  - nolintlint
  - staticcheck
  - unconvert
  - unused
  - wrapcheck
  exclusions:
    rules:
    - path: '(.+)_test\.go'
      linters:
      - gocognit
      - gocyclo
  settings:
    gocognit:
      min-complexity: 15
    gocyclo:
      min-complexity: 12
    govet:
      enable:
      - shadow
    staticcheck:
      # Ginkgo/gomega BDD suites use dot imports by convention
      # (DESIGN.md — Testing: ginkgo/gomega everywhere).
      dot-import-whitelist:
      - github.com/onsi/ginkgo/v2
      - github.com/onsi/gomega

formatters:
  enable:
  - gofumpt
