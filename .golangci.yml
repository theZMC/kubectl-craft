version: "2"

run:
  # pin_dependencies keeps the repo-root package (dependencies.go) buildable
  # and therefore linted everywhere golangci-lint runs — CI and the local
  # pre-commit hook alike; without it the root dir has no buildable files
  # and per-dir runs hard-fail on a typechecking error.
  build-tags:
  - pin_dependencies

linters:
  default: standard
  enable:
  - errcheck
  - errname
  - errorlint
  - ginkgolinter
  - gocognit
  - gocyclo
  - govet
  - ineffassign
  - misspell
  - nilnil
  - nolintlint
  - revive
  - staticcheck
  - unconvert
  - unused
  - wrapcheck
  exclusions:
    rules:
    - path: '(.+)_test\.go'
      linters:
      - gocognit
      - gocyclo
  settings:
    gocognit:
      min-complexity: 15
    gocyclo:
      min-complexity: 12
    govet:
      enable:
      - shadow
    revive:
      rules:
      # Enforce Go initialism casing (URL, HTTP, API, ID, …) in every
      # identifier we declare — Url/Http/Api spellings never land.
      - name: var-naming
    staticcheck:
      # Ginkgo/gomega BDD suites use dot imports by convention
      # (DESIGN.md — Testing: ginkgo/gomega everywhere).
      dot-import-whitelist:
      - github.com/onsi/ginkgo/v2
      - github.com/onsi/gomega

formatters:
  enable:
  - gofumpt
